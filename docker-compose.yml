version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: support_agent
      POSTGRES_PASSWORD: support_agent
      POSTGRES_DB: support_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support_agent"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://support_agent:support_agent@postgres:5432/support_agent
      DATABASE_URL_SYNC: postgresql://support_agent:support_agent@postgres:5432/support_agent
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
